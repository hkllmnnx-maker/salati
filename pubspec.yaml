name: salati
description: "صلاتي - تطبيق إسلامي احترافي لأوقات الصلاة والأذكار والقبلة والقرآن."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: 6.1.5+1

  # Local Storage
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0

  # Prayer & Islamic
  adhan: ^2.0.0-nullsafety.2
  hijri: ^3.0.0

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Sensors (Qibla compass)
  flutter_compass: ^0.8.1

  # Permissions
  permission_handler: ^11.3.1

  # Notifications
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

  # Network
  http: 1.5.0
  connectivity_plus: ^6.1.0

  # UI
  google_fonts: ^6.2.1
  intl: ^0.20.2
  share_plus: ^10.1.2
  flutter_svg: ^2.0.16

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/data/
